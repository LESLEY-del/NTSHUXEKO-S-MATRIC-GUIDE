// Function to normalize input: lowercase and trim
const normalize = str => str.trim().toLowerCase();

const btn = document.getElementById("btn");
const results = document.getElementById("results");

btn.onclick = function() {
  const input = normalize(document.getElementById("text").value);
  results.innerHTML = ""; // Clear previous results
  let found = false;

  for (const key in papers) {
    if (normalize(key) === input) {
      found = true;

      papers[key].forEach(paper => {
        // Create main card div
        const div = document.createElement("div");
        div.className = "paper";

        // Left section: icon + paper name
        const left = document.createElement("div");
        left.className = "paper-text";

        const icon = document.createElement("img");
        icon.src = "pdf-icon.png"; // Place your PDF icon in the folder
        icon.alt = "PDF";

        const title = document.createElement("span");
        title.textContent = paper.name;

        left.appendChild(icon);
        left.appendChild(title);

        // Memo button
        const memoBtn = document.createElement("span");
        memoBtn.className = "memo";
        memoBtn.textContent = "View Memo";
        memoBtn.onclick = e => {
          e.stopPropagation(); // Prevent opening main paper
          window.open(paper.memo, "_blank");
        };

        // Open paper on clicking the card
        div.onclick = () => window.open(paper.link, "_blank");

        // Append left section and memo button to card
        div.appendChild(left);
        div.appendChild(memoBtn);

        results.appendChild(div);
      });
    }
  }

  if (!found) {
    results.innerHTML = "<p>❌ No papers found for that subject.</p>";
  }
};
